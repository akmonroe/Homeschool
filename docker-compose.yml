services:
  app:
    build: .
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-llama3.2}
    ports:
      - "4500:4500"
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
