services:
  app:
    build: .
    environment:
      # When the `ollama` profile is off, point at host Ollama if you run it locally,
      # or leave default (unused until you enable the profile or change this).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-llama3.2}
    ports:
      - "4500:4500"

  # Opt-in: avoids pulling the large Ollama image on every `docker compose up`.
  # Start with: docker compose --profile ollama up -d
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
