services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homeschool
      POSTGRES_PASSWORD: homeschool
      POSTGRES_DB: homeschool
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeschool -d homeschool"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    extra_hosts:
      # Lets the container reach Ollama on the host at port 11434 (same as host
      # networking in dictation_app, but compatible with published ports here).
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-llama3.2}
      DICTATION_OLLAMA_MODEL: ${DICTATION_OLLAMA_MODEL:-gemma4:e4b}
      # Dictation VITS: VCTK speaker id (e.g. p225). Slower playback: 0.25–1.0 (lower = slower after ffmpeg).
      DICTATION_TTS_SPEAKER: ${DICTATION_TTS_SPEAKER:-p225}
      DICTATION_TTS_PLAYBACK_TEMPO: ${DICTATION_TTS_PLAYBACK_TEMPO:-0.58}
      DICTATION_TTS_WORD_PLAYBACK_TEMPO: ${DICTATION_TTS_WORD_PLAYBACK_TEMPO:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://homeschool:homeschool@postgres:5432/homeschool}
    ports:
      - "4500:4500"
    volumes:
      - dictation-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  # Opt-in: avoids pulling the large Ollama image on every `docker compose up`.
  # Start with: docker compose --profile ollama up -d
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
  dictation-data:
  postgres-data:
