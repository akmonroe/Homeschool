services:
  app:
    build: .
    extra_hosts:
      # Lets the container reach Ollama on the host at port 11434 (same as host
      # networking in dictation_app, but compatible with published ports here).
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-llama3.2}
    ports:
      - "4500:4500"

  # Opt-in: avoids pulling the large Ollama image on every `docker compose up`.
  # Start with: docker compose --profile ollama up -d
  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
