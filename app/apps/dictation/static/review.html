<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictionary review — Dictation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="review.css" />
</head>
<body class="dict-review-page">
  <div class="top">
    <h1>📖 Review all dictionary words</h1>
    <div>
      <a href="/apps/dictation/ui/">← Student app</a>
      · <a href="/admin/#dictionary">Platform admin (dictionary)</a>
    </div>
  </div>

  <div class="controls">
    <input type="search" id="filter" placeholder="Search word…" />
    <button type="button" id="btn-search">Search</button>
    <button type="button" id="btn-clear">Clear</button>
  </div>

  <p class="meta" style="max-width:900px;margin:0 auto 8px;text-align:center" id="summary"></p>
  <p id="err" class="err" style="display:none"></p>
  <div id="list"></div>

  <div class="pager">
    <button type="button" id="btn-prev">Previous page</button>
    <span id="page-label"></span>
    <button type="button" id="btn-next">Next page</button>
  </div>

  <script>
    const API = '/apps/dictation';
    const PAGE_SIZE = 40;
    let offset = 0;
    let total = 0;
    let query = '';

    function pron(ext) {
      const p = ext && ext.pronunciation;
      if (!p) return '';
      const ipa = p.ipa_or_dictionary_phonetic || '';
      const rules = (p.pronunciation_rules || []).join(' ');
      const bits = [ipa && ('IPA / guide: ' + ipa), rules].filter(Boolean);
      return bits.join(' · ');
    }

    function etym(ext) {
      return (ext && ext.etymology) ? String(ext.etymology) : '';
    }

    function tricks(ext) {
      return Array.isArray(ext && ext.spelling_tricks) ? ext.spelling_tricks : [];
    }

    function renderWord(w) {
      const ext = w.extensions || {};
      const pr = pron(ext);
      const et = etym(ext);
      const tr = tricks(ext);
      let tricksHtml = '';
      if (tr.length) {
        tricksHtml = '<ul class="tricks">' + tr.map(t => '<li>' + escapeHtml(t) + '</li>').join('') + '</ul>';
      } else {
        tricksHtml = '<p style="margin:0;color:#95a5a6">No spelling tricks stored yet.</p>';
      }
      return `
        <article class="word-card">
          <h2>${escapeHtml(w.word)}</h2>
          <div class="meta">Level ${w.difficulty_level != null ? w.difficulty_level : '—'} · <code style="font-size:0.75rem">${escapeHtml(w.id)}</code></div>
          <div class="def"><strong>Definition</strong><br>${escapeHtml(w.definition || '(none)')}</div>
          ${pr ? `<div class="section"><strong>Pronunciation</strong><pre>${escapeHtml(pr)}</pre></div>` : ''}
          ${et ? `<div class="section"><strong>Etymology &amp; word history</strong><pre>${escapeHtml(et)}</pre></div>` : ''}
          <div class="section"><strong>Spelling tricks</strong>${tricksHtml}</div>
        </article>`;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function load() {
      document.getElementById('err').style.display = 'none';
      const params = new URLSearchParams({ offset: String(offset), limit: String(PAGE_SIZE) });
      if (query) params.set('q', query);
      const res = await fetch(`${API}/words/review?` + params.toString());
      if (!res.ok) {
        document.getElementById('err').textContent = await res.text();
        document.getElementById('err').style.display = 'block';
        return;
      }
      const data = await res.json();
      total = data.total;
      document.getElementById('summary').textContent =
        `Showing ${data.words.length} of ${total} words (offset ${data.offset}).`;
      document.getElementById('list').innerHTML = data.words.map(renderWord).join('');
      document.getElementById('page-label').textContent =
        `Page ${Math.floor(offset / PAGE_SIZE) + 1} of ${Math.max(1, Math.ceil(total / PAGE_SIZE))}`;
      document.getElementById('btn-prev').disabled = offset <= 0;
      document.getElementById('btn-next').disabled = offset + PAGE_SIZE >= total;
    }

    document.getElementById('btn-search').onclick = () => {
      query = document.getElementById('filter').value.trim();
      offset = 0;
      load();
    };
    document.getElementById('btn-clear').onclick = () => {
      document.getElementById('filter').value = '';
      query = '';
      offset = 0;
      load();
    };
    document.getElementById('btn-prev').onclick = () => {
      offset = Math.max(0, offset - PAGE_SIZE);
      load();
    };
    document.getElementById('btn-next').onclick = () => {
      offset = offset + PAGE_SIZE;
      load();
    };
    document.getElementById('filter').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-search').click();
    });

    load();
  </script>
</body>
</html>
