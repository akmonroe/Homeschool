<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spelling Dictation</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; /* Kid-friendly fonts */
            background-color: #f0f8ff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #2c3e50; }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            font-size: 1.2em;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-check { background-color: #2ecc71; }
        .btn-listen { background-color: #9b59b6; font-size: 1.5em; padding: 20px; width: 100%;}
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
        .btn-row button { flex: 1; min-width: 140px; font-size: 1.05em; padding: 12px 16px; }
        .btn-word { background-color: #8e44ad; }
        .btn-again { background-color: #16a085; }
        .btn-help { background-color: #e67e22; }
        #help-area { margin-top: 14px; padding: 14px; background: #fef9e7; border: 2px solid #f4d03f; border-radius: 10px; text-align: left; font-size: 1.05em; display: none; }
        #help-area h4 { margin: 12px 0 6px; font-size: 0.95em; color: #7d6608; }
        #help-area p { margin: 0 0 8px; line-height: 1.4; }
        #help-area ul { margin: 4px 0 0 1.2em; padding: 0; }
        
        #feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 1.1em;
            line-height: 1.4;
        }
        .correct { background-color: #d5f5e3; color: #1e8449; border: 1px solid #2ecc71; }
        .incorrect { background-color: #fadedb; color: #a93226; border: 1px solid #e74c3c; }
        
        #loading { display: none; color: #7f8c8d; font-style: italic; margin-top: 10px;}
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>Welcome to Spelling!</h1>
        <div style="position: absolute; top: 10px; right: 20px; font-size: 0.8em;">
            <a href="/apps/dictation/ui/review.html" style="color: #bdc3c7; text-decoration: none; margin-right: 12px;">📖 Words</a>
            <a href="/admin/" style="color: #bdc3c7; text-decoration: none;">⚙️ Admin</a>
        </div>
        <p>Who is playing today?</p>
        <select id="user-select">
            <option value="">Loading students...</option>
        </select>
        <button onclick="startSession()">Let's Go!</button>
    </div>

    <div class="container hidden" id="game-screen">
        <h2 id="progress-text">Word 1 of ?</h2>
        
        <button class="btn-listen" id="btn-listen" onclick="playAudio()">🔊 Listen to Sentence</button>
        <p id="listen-hint" style="display:none;font-size:0.9em;color:#7f8c8d;margin:6px 0 0;">Same sentence each time until you go to the next word.</p>
        <div class="btn-row">
            <button type="button" class="btn-word" id="btn-word-only" disabled onclick="playWordOnly()">🎯 Hear Word Only</button>
            <button type="button" class="btn-again" id="btn-sentence-again" disabled onclick="playSentenceAgain()">🔁 Sentence Again</button>
        </div>

    <div id="loading">Generating audio... this takes a few seconds...</div>
        
        <p id="sentence-hint" style="font-size: 1.4em; font-weight: bold; color: #2c3e50; display: none; margin: 20px 0;"></p>
        
        <input type="text" id="spelling-input" placeholder="Type the missing word..." autocomplete="off" spellcheck="false">
        
        <div>
            <button class="btn-check" id="btn-submit" onclick="checkSpelling()">Check Answer</button>
            <button id="btn-hint" class="btn-help" style="color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 10px; cursor: pointer; display: none;" onclick="getHint()">💡 Definition, Etymology &amp; Spelling Tips</button>
            
            <button id="btn-next" class="hidden" onclick="loadNextWord()">Next Word ➡️</button>
        </div>

        <div id="help-area"></div>
        <div id="hint-area" style="margin-top: 15px; padding: 15px; background: #fcf3cf; border: 2px solid #f1c40f; border-radius: 10px; color: #7d6608; font-size: 1.1em; display: none;"></div>
        <div id="feedback-area"></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const API_BASE = '/apps/dictation';
        let currentUserId = null;
        let dueWords = [];
        let currentIndex = 0;
        let currentTargetWord = "";
        /** Surface form for TTS and blank length (from server display_word). */
        let currentDisplayWord = "";
        let lastSentenceAudioUrl = "";
        let lastWordAudioUrl = "";
        let audioReady = false;
        /** Matches server /generate revision so browser cache busts only when audio is regenerated. */
        let audioRevision = 0;

        function escapeRegExp(s) {
            return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function resolveAudioUrl(pathOrUrl) {
            if (!pathOrUrl) return '';
            if (pathOrUrl.startsWith('http://') || pathOrUrl.startsWith('https://')) return pathOrUrl;
            if (pathOrUrl.startsWith('/')) return pathOrUrl;
            return `${API_BASE}/${pathOrUrl.replace(/^\/+/, '')}`;
        }

        // --- ADD THIS NEW FUNCTION ---
        async function fetchUsersOnLoad() {
            try {
                const response = await fetch(`${API_BASE}/users`);
                const data = await response.json();
                const select = document.getElementById('user-select');
                
                // Clear out the "Loading..." text
                select.innerHTML = ''; 

                if (data.users.length === 0) {
                    select.innerHTML = '<option value="">No students found. Add them in the API!</option>';
                    return;
                }

                // Create an option for every kid in the database
                data.users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.id;
                    option.textContent = user.name;
                    select.appendChild(option);
                });
            } catch (e) {
                document.getElementById('user-select').innerHTML = '<option value="">Error loading students</option>';
            }
        }

// Tell the browser to run this the second the page opens
        window.onload = fetchUsersOnLoad;


        async function startSession() {
            // 1. Get the selected child's ID
            currentUserId = document.getElementById('user-select').value;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            // 2. Ask the database what words they need to practice today
            try {
                const response = await fetch(`${API_BASE}/users/${currentUserId}/words/due`);
                const data = await response.json();

                if (data.count === 0) {
                    showAllDone();
                    return;
                }

                dueWords = data.due_words;
                currentIndex = 0;
                loadWordToUI();
            } catch (e) {
                alert("Could not connect to the database!");
            }
        }

        function loadWordToUI() {
            const row = dueWords[currentIndex];
            currentTargetWord = row.word;
            let dw = (row.display_word && String(row.display_word).trim()) ? String(row.display_word).trim() : null;
            if (dw && dw.toLowerCase() === currentTargetWord) {
                dw = currentTargetWord.charAt(0).toUpperCase() + currentTargetWord.slice(1);
            }
            currentDisplayWord = dw || (currentTargetWord.charAt(0).toUpperCase() + currentTargetWord.slice(1));
            audioReady = false;
            audioRevision = 0;
            lastSentenceAudioUrl = "";
            lastWordAudioUrl = "";
            document.getElementById('listen-hint').style.display = 'none';
            document.getElementById('btn-word-only').disabled = true;
            document.getElementById('btn-sentence-again').disabled = true;
            document.getElementById('progress-text').innerText = `Word ${currentIndex + 1} of ${dueWords.length}`;
            document.getElementById('spelling-input').value = "";
            document.getElementById('feedback-area').style.display = 'none';
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-submit').classList.remove('hidden');
            
            // Auto-focus the text box for tablet typing
            document.getElementById('spelling-input').focus();
       
            // Hide the hint elements for the new word
            document.getElementById('sentence-hint').style.display = 'none';
            document.getElementById('btn-hint').style.display = 'none';
            document.getElementById('hint-area').style.display = 'none';
            document.getElementById('help-area').style.display = 'none';
            document.getElementById('help-area').innerHTML = '';
            document.getElementById('btn-hint').innerText = '💡 Definition, Etymology & Spelling Tips';
            document.getElementById('btn-hint').disabled = false;
        }

        async function playAudio() {
            const btn = document.getElementById('btn-listen');
            const loading = document.getElementById('loading');
            const firstTime = !audioReady;
            btn.disabled = true;
            if (firstTime) {
                loading.style.display = 'block';
            }
            try {
                const response = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: currentDisplayWord, regenerate: false })
                });
                const data = await response.json();

                if (data.status === 'success') {
                    const rev = typeof data.revision === 'number' ? data.revision : 0;
                    audioRevision = rev;
                    const ts = Date.now();
                    lastSentenceAudioUrl = resolveAudioUrl(data.audio_url);
                    lastWordAudioUrl = resolveAudioUrl(data.word_audio_url || '/apps/dictation/audio/word');

                    const audioPlayer = document.getElementById('audio-player');
                    const sep = lastSentenceAudioUrl.includes('?') ? '&' : '?';
                    audioPlayer.src = lastSentenceAudioUrl + sep + 'r=' + rev + '&t=' + ts;
                    audioPlayer.play();

                    const blankLen = Math.max(currentDisplayWord.replace(/\s/g, '').length, 3);
                    const blank = '_'.repeat(blankLen);
                    const regex = new RegExp(`\\b${escapeRegExp(currentDisplayWord)}\\b|\\b${escapeRegExp(currentTargetWord)}\\b`, 'gi');
                    const blankedSentence = data.sentence.replace(regex, blank);

                    const sentenceEl = document.getElementById('sentence-hint');
                    sentenceEl.innerText = blankedSentence;
                    sentenceEl.style.display = 'block';
                    document.getElementById('listen-hint').style.display = 'block';
                    document.getElementById('btn-hint').style.display = 'inline-block';
                    audioReady = true;
                    document.getElementById('btn-word-only').disabled = false;
                    document.getElementById('btn-sentence-again').disabled = false;
                }

            } catch (e) {
                alert("Error generating audio!");
            }

            btn.disabled = false;
            loading.style.display = 'none';
        }

        function playSentenceAgain() {
            if (!audioReady || !lastSentenceAudioUrl) return;
            const audioPlayer = document.getElementById('audio-player');
            const sep = lastSentenceAudioUrl.includes('?') ? '&' : '?';
            audioPlayer.src = lastSentenceAudioUrl + sep + 'r=' + audioRevision + '&t=' + Date.now();
            audioPlayer.play();
        }

        function playWordOnly() {
            if (!audioReady || !lastWordAudioUrl) return;
            const audioPlayer = document.getElementById('audio-player');
            const sep = lastWordAudioUrl.includes('?') ? '&' : '?';
            audioPlayer.src = lastWordAudioUrl + sep + 'r=' + audioRevision + '&t=' + Date.now();
            audioPlayer.play();
        }

        async function checkSpelling() {
            const userInput = document.getElementById('spelling-input').value;
            if (!userInput) return;

            // Send what the kid typed to the grading endpoint
            const response = await fetch(`${API_BASE}/users/${currentUserId}/grade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    target_word: currentTargetWord,
                    user_input: userInput
                })
            });
            const data = await response.json();

            // Display the AI feedback
            const feedbackArea = document.getElementById('feedback-area');
            feedbackArea.style.display = 'block';
            feedbackArea.innerText = data.feedback;

            // Turn the box green or red
            if (data.is_correct) {
                feedbackArea.className = "correct";
            } else {
                feedbackArea.className = "incorrect";
            }

            // Swap the check button for the next button
            document.getElementById('btn-submit').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
        }

        async function getHint() {
            const btn = document.getElementById('btn-hint');
            btn.innerText = "⏳ Loading…";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/words/${encodeURIComponent(currentTargetWord)}/study-hints`);
                const data = await res.json();

                if (res.ok) {
                    const help = document.getElementById('help-area');
                    const tricks = Array.isArray(data.spelling_tricks) ? data.spelling_tricks : [];
                    let tricksHtml = '';
                    if (tricks.length) {
                        tricksHtml = '<ul>' + tricks.map(t => '<li>' + escapeHtml(String(t)) + '</li>').join('') + '</ul>';
                    } else {
                        tricksHtml = '<p style="margin:0;color:#7f8c8d">No spelling tips on file for this word yet.</p>';
                    }
                    const etRaw = (data.etymology && String(data.etymology).trim()) ? String(data.etymology).trim() : '';
                    const etHtmlBody = etRaw
                        ? etRaw.split(/\n/).map(line => escapeHtml(line)).join('<br>')
                        : '';
                    let etHtml = etRaw
                        ? '<h4>Word history (etymology)</h4><p>' + etHtmlBody + '</p>'
                        : '<h4>Word history (etymology)</h4><p style="color:#7f8c8d">No etymology on file yet.</p>';
                    help.innerHTML =
                        '<h4>Definition</h4><p>' + escapeHtml(data.definition || '') + '</p>' +
                        etHtml +
                        '<h4>Spelling tips</h4>' + tricksHtml;
                    help.style.display = 'block';
                    btn.style.display = 'none';
                }
            } catch (e) {
                alert("Could not load study hints.");
                btn.innerText = '💡 Definition, Etymology & Spelling Tips';
                btn.disabled = false;
            }
        }

        function loadNextWord() {
            currentIndex++;
            if (currentIndex < dueWords.length) {
                loadWordToUI();
            } else {
                showAllDone();
            }
        }

        function showAllDone() {
            document.getElementById('progress-text').innerText = "All done for today! 🎉";
            document.getElementById('btn-listen').style.display = 'none';
            document.getElementById('btn-word-only').style.display = 'none';
            document.getElementById('btn-sentence-again').style.display = 'none';
            document.querySelector('.btn-row').style.display = 'none';
            document.getElementById('spelling-input').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-submit').style.display = 'none';
            document.getElementById('btn-hint').style.display = 'none';
            document.getElementById('feedback-area').style.display = 'none';
        }
    </script>
</body>
</html>
